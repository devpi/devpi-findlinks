---
name: "CI"

on:
  push:

jobs:
  tests:
    name: "${{ matrix.tox-envs }} - Python ${{ matrix.python-version }}"
    permissions:
      contents: read
      actions: read
    runs-on: "ubuntu-latest"
    env:
      PY_COLORS: 1

    strategy:
      matrix:
        include:
          - python-version: "3.8"
            tox-envs: "py38"
          - python-version: "3.14"
            tox-envs: "py314"
          - python-version: "3.8"
            tox-envs: "py38-server520"

    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          persist-credentials: false
      - uses: "actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405" # v6.2.0
        with:
          python-version: "${{ matrix.python-version }}"
      - name: "Install dependencies"
        run: |
          set -xe -o nounset
          python -VV
          python -m site
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade virtualenv tox

      - name: "Run tox targets for ${{ matrix.python-version }}"
        run: |
          set -xe -o nounset
          python -m tox -a -vv
          python -m tox -v -e ${{ matrix.tox-envs }} -- -v --color=yes

  flake8:
    env:
      PY_COLORS: 1

    permissions:
      contents: read
      actions: read

    runs-on: "ubuntu-latest"

    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          persist-credentials: false
      - uses: "actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405" # v6.2.0
        with:
          python-version: "3.x"
      - name: "Install dependencies"
        shell: "bash"
        run: |
          set -xe -o nounset
          python -VV
          python -m site
          python -m pip install --upgrade pip flake8 setuptools wheel
      - name: "Run flake8"
        shell: "bash"
        run: |
          set -xe -o nounset
          flake8 --config .flake8 devpi_findlinks tests
